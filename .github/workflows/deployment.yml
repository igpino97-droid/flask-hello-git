name: CI/CD to GKE

on:
  push:
    branches:
      - main
      - staging

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: flask-k8s-cicd-489601
  GAR_LOCATION: us-east1
  REPOSITORY: flask-repo
  CLUSTER_NAME: flask-cluster
  CLUSTER_LOCATION: us-east1
  IMAGE_NAME: flask-app

jobs:

  # 🔧 BUILD + PUSH
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/863699223840/locations/global/workloadIdentityPools/github-pool/providers/github-provider
        service_account: github-cicd@flask-k8s-cicd-489601.iam.gserviceaccount.com

    - name: Setup Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker authentication
      run: |
        gcloud auth configure-docker $GAR_LOCATION-docker.pkg.dev --quiet

    - name: Build and Push image
      id: build
      run: |
        IMAGE="$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:$GITHUB_SHA"

        echo "Building image: $IMAGE"

        docker build -f docker/Dockerfile -t $IMAGE .
        docker push $IMAGE

        docker tag $IMAGE $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:latest
        docker push $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:latest

        echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # 🚀 DEPLOY
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/863699223840/locations/global/workloadIdentityPools/github-pool/providers/github-provider
        service_account: github-cicd@flask-k8s-cicd-489601.iam.gserviceaccount.com

    - name: Setup Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials $CLUSTER_NAME \
        --region $CLUSTER_LOCATION \
        --project $PROJECT_ID

    - name: Set environment
      id: env
      run: |
        if [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
          echo "NAMESPACE=staging" >> $GITHUB_OUTPUT
        else
          echo "NAMESPACE=production" >> $GITHUB_OUTPUT
        fi

    - name: Deploy to GKE
      run: |
        IMAGE="${{ needs.build-and-push.outputs.image }}"

        echo "Deploying image: $IMAGE"
        echo "Namespace: ${{ steps.env.outputs.NAMESPACE }}"

        sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yml

        kubectl apply -f k8s/ -n ${{ steps.env.outputs.NAMESPACE }}

        kubectl rollout status deployment/$IMAGE_NAME -n ${{ steps.env.outputs.NAMESPACE }}