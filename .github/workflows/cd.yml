name: CD to GKE

on:
  push:
    branches:
      - staging

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: flask-k8s-cicd
  GAR_LOCATION: us-central1
  REPOSITORY: flask-repo
  CLUSTER_NAME: flask-cluster
  CLUSTER_ZONE: us-central1-a

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/503696509006/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-cicd@flask-k8s-cicd.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push
        run: |
          IMAGE=${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/flask-hello:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials $CLUSTER_NAME --zone $CLUSTER_ZONE

      - name: Deploy to staging
        run: |
          kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -
          kubectl set image deployment/flask-hello flask-hello=$IMAGE -n staging || \
          kubectl create deployment flask-hello --image=$IMAGE -n staging